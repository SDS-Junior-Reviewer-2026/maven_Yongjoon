name: Email Test

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone
    - uses: actions/checkout@v4

    # 2. AWS CLI 로그인 하기
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    # 3. AWS CLI를 이용해 이메일 전송하기
    - name: Send Email with SES
      run: |
        aws ses send-email \
          --from "mincoding@naver.com" \
          --destination "ToAddresses=yongjoon2__@naver.com" \
          --message "Subject={Data=테스트메일 전송}, Body={Text={Data=안녕? KFC From Github Actions}}"
