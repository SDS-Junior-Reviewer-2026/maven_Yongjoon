name: Email Test

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone
    - uses: actions/checkout@v4

    # 2. AWS CLI 로그인 하기
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    # 3. AWS CLI를 이용해 이메일 전송하기
    - name: Send Email with SES
      run: |
        aws ses send-email \
          --from "yongjoon2__@naver.com" \
          --destination "ToAddresses=sejin.choi@mincoding.co.kr" \
          --message "Subject={Data='권용준'}, Body={Text={Data='printf("Hello, world!};'}"
